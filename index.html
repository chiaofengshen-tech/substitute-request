<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>代課詢問文字產生器</title>
<link rel="apple-touch-icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Crect width='100' height='100' rx='20' fill='%237fb3d5'/%3E%3Ctext x='50' y='62' font-size='48' text-anchor='middle' fill='white' font-family='sans-serif'%3E代%3C/text%3E%3C/svg%3E">
<style>
  :root {
    --bg: #f7f5f0;
    --card: #ffffff;
    --blue: #7fb3d5;
    --blue-dark: #5c95bb;
    --text: #3a3a3a;
    --border: #e0ddd4;
  }
  * { box-sizing: border-box; }
  body {
    margin: 0;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "Noto Sans TC", sans-serif;
    background: var(--bg);
    color: var(--text);
    padding: 16px;
  }
  .container {
    max-width: 560px;
    margin: 0 auto;
  }
  h1 {
    font-size: 1.3rem;
    text-align: center;
    margin: 8px 0 4px;
    color: var(--blue-dark);
  }
  .subtitle {
    text-align: center;
    font-size: 0.85rem;
    color: #888;
    margin-bottom: 20px;
  }
  .card {
    background: var(--card);
    border-radius: 14px;
    padding: 20px;
    box-shadow: 0 2px 8px rgba(0,0,0,0.05);
    margin-bottom: 16px;
  }
  label {
    display: block;
    font-size: 0.9rem;
    font-weight: 600;
    margin-bottom: 6px;
    margin-top: 14px;
    color: var(--text);
  }
  label:first-child { margin-top: 0; }
  label.field-label {
    font-size: 0.78rem;
    font-weight: 400;
    color: #888;
    margin-top: 8px;
    margin-bottom: 4px;
  }
  input {
    width: 100%;
    padding: 10px 12px;
    font-size: 1rem;
    border: 1px solid var(--border);
    border-radius: 8px;
    background: #fafaf8;
    color: var(--text);
  }
  input:focus {
    outline: none;
    border-color: var(--blue);
    background: #fff;
  }
  .item-block {
    margin-top: 10px;
    padding: 14px;
    border: 1px solid var(--border);
    border-radius: 10px;
    background: #fafaf8;
  }
  .item-block:first-of-type {
    margin-top: 0;
  }
  .item-header {
    display: flex;
    justify-content: space-between;
    align-items: center;
  }
  .item-title {
    font-size: 0.85rem;
    font-weight: 700;
    color: var(--blue-dark);
  }
  .item-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 0 10px;
  }
  .item-grid .full {
    grid-column: 1 / -1;
  }
  .remove-btn {
    flex: 0 0 auto;
    width: 32px;
    height: 32px;
    border-radius: 8px;
    background: #f3d6d6;
    color: #a14444;
    font-size: 1rem;
    font-weight: 700;
    line-height: 1;
    padding: 0;
    border: none;
    cursor: pointer;
  }
  .btn-add {
    margin-top: 10px;
    width: 100%;
    background: #eaf3f8;
    color: var(--blue-dark);
    border: 1px dashed var(--blue);
    padding: 10px;
    border-radius: 8px;
    font-size: 0.9rem;
    font-weight: 600;
    cursor: pointer;
  }
  .btn-row {
    display: flex;
    gap: 10px;
    margin-top: 20px;
  }
  button {
    flex: 1;
    padding: 12px;
    font-size: 1rem;
    border: none;
    border-radius: 10px;
    cursor: pointer;
    font-weight: 600;
    transition: opacity 0.15s;
  }
  button:active { opacity: 0.8; }
  .btn-primary {
    background: var(--blue);
    color: white;
  }
  .btn-secondary {
    background: #eee;
    color: var(--text);
  }
  .output-wrap {
    position: relative;
  }
  textarea#output {
    width: 100%;
    min-height: 220px;
    font-size: 1rem;
    line-height: 1.6;
    padding: 14px;
    border-radius: 10px;
    border: 1px solid var(--border);
    background: #fafaf8;
    color: var(--text);
    resize: vertical;
    font-family: inherit;
  }
  .output-buttons {
    display: flex;
    gap: 10px;
    margin-top: 12px;
  }
  .toast {
    position: fixed;
    bottom: 30px;
    left: 50%;
    transform: translateX(-50%) translateY(20px);
    background: var(--blue-dark);
    color: white;
    padding: 10px 20px;
    border-radius: 20px;
    font-size: 0.9rem;
    opacity: 0;
    transition: opacity 0.2s, transform 0.2s;
    pointer-events: none;
  }
  .toast.show {
    opacity: 1;
    transform: translateX(-50%) translateY(0);
  }
</style>
</head>
<body>
<div class="container">
  <h1>📚 代課詢問文字產生器</h1>
  <p class="subtitle">產生 LINE 詢問訊息，先詢問代課老師是否方便</p>

  <div class="card">
    <label for="subTeacher">代課老師</label>
    <input id="subTeacher" type="text" placeholder="例：王">

    <label>代課項目（可新增多筆）</label>
    <div id="itemList"></div>
    <button type="button" class="btn-add" id="addItemBtn">＋ 新增一筆</button>

    <div class="btn-row">
      <button class="btn-primary" id="generateBtn">產生文字</button>
      <button class="btn-secondary" id="clearBtn">清空</button>
    </div>
  </div>

  <div class="card output-wrap">
    <label for="output">產生結果</label>
    <textarea id="output" readonly placeholder="按下「產生文字」後，結果會顯示在這裡"></textarea>
    <div class="output-buttons">
      <button class="btn-primary" id="copyBtn">複製文字</button>
    </div>
  </div>
</div>

<div class="toast" id="toast">已複製</div>

<script>
let itemCount = 0;

function addItem() {
  itemCount++;
  const block = document.createElement('div');
  block.className = 'item-block';
  block.innerHTML = `
    <div class="item-header">
      <span class="item-title">代課項目</span>
      <button type="button" class="remove-btn" title="刪除這筆">×</button>
    </div>
    <div class="item-grid">
      <div>
        <label class="field-label">日期</label>
        <input type="text" class="f-date" placeholder="例：6/28 或 9/1～9/5">
      </div>
      <div>
        <label class="field-label">星期</label>
        <input type="text" class="f-weekday" placeholder="例：三 或 一～五">
      </div>
      <div>
        <label class="field-label">節次</label>
        <input type="text" class="f-period" placeholder="例：第3節 或 第2、5節">
      </div>
      <div>
        <label class="field-label">班級</label>
        <input type="text" class="f-class" placeholder="例：201">
      </div>
      <div class="full">
        <label class="field-label">科目</label>
        <input type="text" class="f-subject" placeholder="例：生活、健康">
      </div>
      <div class="full">
        <label class="field-label">授課教師</label>
        <input type="text" class="f-teacher" placeholder="例：陳">
      </div>
    </div>
  `;
  document.getElementById('itemList').appendChild(block);
  block.querySelector('.remove-btn').addEventListener('click', () => {
    if (document.querySelectorAll('#itemList .item-block').length > 1) block.remove();
  });

  const dateInput = block.querySelector('.f-date');
  const weekdayInput = block.querySelector('.f-weekday');
  dateInput.addEventListener('input', () => {
    if (weekdayInput.value.trim() !== '' && !weekdayInput.dataset.auto) return;
    const guess = guessWeekday(dateInput.value);
    if (guess) {
      weekdayInput.value = guess;
      weekdayInput.dataset.auto = '1';
    } else if (weekdayInput.dataset.auto) {
      weekdayInput.value = '';
    }
  });
  weekdayInput.addEventListener('input', () => {
    delete weekdayInput.dataset.auto;
  });
}

const WEEKDAY_CHARS = ['日','一','二','三','四','五','六'];

function resolveDate(month, day) {
  if (month < 1 || month > 12 || day < 1 || day > 31) return null;
  const today = new Date();
  let date = new Date(today.getFullYear(), month - 1, day);
  if ((today - date) / 86400000 > 30) {
    date = new Date(today.getFullYear() + 1, month - 1, day);
  }
  return date;
}

function guessWeekday(str) {
  const s = str.trim();

  const rangeMatch = s.match(/^(\d{1,2})[\/\-](\d{1,2})\s*[~～]\s*(\d{1,2})[\/\-](\d{1,2})$/);
  if (rangeMatch) {
    const d1 = resolveDate(Number(rangeMatch[1]), Number(rangeMatch[2]));
    const d2 = resolveDate(Number(rangeMatch[3]), Number(rangeMatch[4]));
    if (!d1 || !d2) return null;
    const w1 = WEEKDAY_CHARS[d1.getDay()];
    const w2 = WEEKDAY_CHARS[d2.getDay()];
    return `${w1}～${w2}`;
  }

  const singleMatch = s.match(/^(\d{1,2})[\/\-](\d{1,2})$/);
  if (singleMatch) {
    const d = resolveDate(Number(singleMatch[1]), Number(singleMatch[2]));
    return d ? WEEKDAY_CHARS[d.getDay()] : null;
  }

  if (/[、,，]/.test(s)) {
    const parts = s.split(/[、,，]/).map(p => p.trim()).filter(Boolean);
    if (parts.length > 1) {
      const weekdays = [];
      for (const part of parts) {
        const m = part.match(/^(\d{1,2})[\/\-](\d{1,2})$/);
        if (!m) return null;
        const d = resolveDate(Number(m[1]), Number(m[2]));
        if (!d) return null;
        weekdays.push(WEEKDAY_CHARS[d.getDay()]);
      }
      return weekdays.join('、');
    }
  }

  return null;
}

function getVal(id) {
  const el = document.getElementById(id);
  return el ? el.value.trim() : '';
}

const SUBJECT_DICT = [
  '國語','數學','英語','英文','自然科學','自然','社會','健康與體育','健康',
  '體育','藝術','綜合活動','綜合','資訊','本土語文','閩南語','客家語',
  '原住民語','新住民語','音樂','美術','生活課程','生活','閱讀','班會',
  '彈性課程','彈性','社團活動','社團','輔導活動','輔導','童軍','家政','科技'
].sort((a, b) => b.length - a.length);

function tokenizeSubjects(str) {
  let i = 0;
  const tokens = [];
  while (i < str.length) {
    const match = SUBJECT_DICT.find(w => str.startsWith(w, i));
    if (!match) return null;
    tokens.push(match);
    i += match.length;
  }
  return tokens;
}

function formatSubjects(raw) {
  const s = raw.trim();
  if (!s) return '';
  if (/[、,，\s]/.test(s)) {
    return s.split(/[、,，\s]+/).filter(Boolean).join('、');
  }
  const tokens = tokenizeSubjects(s);
  return tokens ? tokens.join('、') : s;
}

function getItems() {
  const blocks = document.querySelectorAll('#itemList .item-block');
  return Array.from(blocks).map(block => ({
    date: block.querySelector('.f-date').value.trim(),
    weekday: block.querySelector('.f-weekday').value.trim(),
    period: block.querySelector('.f-period').value.trim(),
    className: block.querySelector('.f-class').value.trim(),
    subject: block.querySelector('.f-subject').value.trim(),
    teacher: block.querySelector('.f-teacher').value.trim()
  }));
}

function generateText() {
  const subTeacherName = getVal('subTeacher');
  const subTeacher = subTeacherName ? `${subTeacherName}老師` : '';
  const items = getItems();

  const lines = items.map((it, i) => {
    const prefix = items.length > 1 ? `${i + 1}. ` : '';
    return `${prefix}日期：${it.date}\n　星期：${it.weekday}\n　節次：${it.period}\n　班級：${it.className}\n　科目：${formatSubjects(it.subject)}\n　授課教師：${it.teacher ? it.teacher + '老師' : ''}`;
  }).join('\n\n');

  const text = `${subTeacher}您好，
想請問您以下時間是否方便幫忙代課？

${lines}

如果有方便的時間，再麻煩您回覆我，謝謝老師。`;

  document.getElementById('output').value = text;
}

function clearAll() {
  document.getElementById('subTeacher').value = '';
  document.getElementById('itemList').innerHTML = '';
  itemCount = 0;
  addItem();
  document.getElementById('output').value = '';
}

function showToast(msg) {
  const toast = document.getElementById('toast');
  toast.textContent = msg;
  toast.classList.add('show');
  setTimeout(() => toast.classList.remove('show'), 1500);
}

async function copyText() {
  const output = document.getElementById('output');
  const text = output.value;
  if (!text) {
    showToast('尚無內容');
    return;
  }
  try {
    await navigator.clipboard.writeText(text);
    showToast('已複製');
    return;
  } catch (e) {
    /* fall through to legacy copy method below */
  }
  try {
    output.focus();
    output.setSelectionRange(0, text.length);
    document.execCommand('copy');
    showToast('已複製');
  } catch (e) {
    showToast('複製失敗，請手動選取');
  }
}

document.getElementById('generateBtn').addEventListener('click', generateText);
document.getElementById('clearBtn').addEventListener('click', clearAll);
document.getElementById('copyBtn').addEventListener('click', copyText);
document.getElementById('addItemBtn').addEventListener('click', () => addItem());

addItem();
</script>
</body>
</html>
